<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" style="display:block;width:100%;height:auto;overflow:visible">
  <defs>
    <style>
      .p1 { animation: drift1 18s ease-in-out infinite; }
      .p2 { animation: drift2 14s ease-in-out infinite; }
      .p3 { animation: drift3 20s ease-in-out infinite; }
      .p4 { animation: drift4 16s ease-in-out infinite; }
      .p5 { animation: drift5 22s ease-in-out infinite; }
      .p6 { animation: drift6 12s ease-in-out infinite; }
      .p7 { animation: drift7 19s ease-in-out infinite; }
      .p8 { animation: drift8 24s ease-in-out infinite; }

      @keyframes drift1 {
        0%, 100% { transform: translate(0, 0); opacity: 0.3; }
        25% { transform: translate(30px, -20px); opacity: 0.8; }
        50% { transform: translate(-10px, -35px); opacity: 0.2; }
        75% { transform: translate(-25px, 10px); opacity: 0.7; }
      }
      @keyframes drift2 {
        0%, 100% { transform: translate(0, 0); opacity: 0.5; }
        33% { transform: translate(-20px, -25px); opacity: 0.9; }
        66% { transform: translate(15px, -10px); opacity: 0.3; }
      }
      @keyframes drift3 {
        0%, 100% { transform: translate(0, 0) scale(1); opacity: 0.4; }
        50% { transform: translate(25px, -15px) scale(1.5); opacity: 0.9; }
      }
      @keyframes drift4 {
        0%, 100% { transform: translate(0, 0); opacity: 0.6; }
        30% { transform: translate(-30px, 10px); opacity: 0.2; }
        60% { transform: translate(10px, -20px); opacity: 0.8; }
      }
      @keyframes drift5 {
        0%, 100% { transform: translate(0, 0) scale(1); opacity: 0.3; }
        40% { transform: translate(15px, 20px) scale(1.3); opacity: 0.7; }
        80% { transform: translate(-20px, -5px) scale(0.8); opacity: 0.4; }
      }
      @keyframes drift6 {
        0%, 100% { transform: translate(0, 0); opacity: 0.7; }
        50% { transform: translate(-15px, -30px); opacity: 0.3; }
      }
      @keyframes drift7 {
        0%, 100% { transform: translate(0, 0); opacity: 0.4; }
        25% { transform: translate(20px, 15px); opacity: 0.8; }
        60% { transform: translate(-25px, -10px); opacity: 0.2; }
        85% { transform: translate(5px, 20px); opacity: 0.6; }
      }
      @keyframes drift8 {
        0%, 100% { transform: translate(0, 0) scale(1.2); opacity: 0.5; }
        35% { transform: translate(-18px, 12px) scale(1); opacity: 0.9; }
        70% { transform: translate(22px, -18px) scale(1.4); opacity: 0.3; }
      }
    </style>
  </defs>
  <!-- Background glow blobs -->
  <circle cx="80" cy="80" r="60" fill="#5e6ad2" opacity="0.04">
    <animate attributeName="cx" values="80;120;60;80" dur="15s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="80;60;90;80" dur="18s" repeatCount="indefinite"/>
    <animate attributeName="r" values="60;80;55;60" dur="12s" repeatCount="indefinite"/>
  </circle>
  <circle cx="320" cy="200" r="50" fill="#a78bfa" opacity="0.03">
    <animate attributeName="cx" values="320;280;350;320" dur="20s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="200;180;220;200" dur="16s" repeatCount="indefinite"/>
  </circle>

  <!-- Particle dots -->
  <g class="p1"><circle cx="50" cy="40" r="2.5" fill="#7170ff" opacity="0.6"/></g>
  <g class="p2"><circle cx="150" cy="20" r="1.8" fill="#a78bfa" opacity="0.5"/></g>
  <g class="p3"><circle cx="280" cy="45" r="3" fill="#5e6ad2" opacity="0.4"/></g>
  <g class="p4"><circle cx="350" cy="80" r="2" fill="#7170ff" opacity="0.7"/></g>
  <g class="p5"><circle cx="100" cy="120" r="2.8" fill="#a78bfa" opacity="0.35"/></g>
  <g class="p6"><circle cx="220" cy="100" r="1.5" fill="#10b981" opacity="0.6"/></g>
  <g class="p7"><circle cx="370" cy="150" r="2.2" fill="#7170ff" opacity="0.5"/></g>
  <g class="p8"><circle cx="60" cy="180" r="3.2" fill="#a78bfa" opacity="0.3"/></g>
  <g class="p1"><circle cx="180" cy="200" r="1.8" fill="#5e6ad2" opacity="0.55"/></g>
  <g class="p3"><circle cx="300" cy="220" r="2.6" fill="#7170ff" opacity="0.4"/></g>
  <g class="p5"><circle cx="120" cy="250" r="2" fill="#10b981" opacity="0.5"/></g>
  <g class="p7"><circle cx="260" cy="260" r="3.5" fill="#a78bfa" opacity="0.3"/></g>
  <g class="p2"><circle cx="380" cy="240" r="1.5" fill="#7170ff" opacity="0.65"/></g>
  <g class="p4"><circle cx="40" cy="270" r="2.3" fill="#5e6ad2" opacity="0.45"/></g>
  <g class="p6"><circle cx="200" cy="280" r="1.9" fill="#a78bfa" opacity="0.5"/></g>
  <g class="p8"><circle cx="340" cy="35" r="2.7" fill="#10b981" opacity="0.35"/></g>

  <!-- Connecting lines (faint constellation) -->
  <line x1="80" y1="60" x2="150" y2="30" stroke="#5e6ad2" stroke-width="0.5" stroke-opacity="0.1">
    <animate attributeName="stroke-opacity" values="0.05;0.2;0.05" dur="8s" repeatCount="indefinite"/>
  </line>
  <line x1="150" y1="30" x2="280" y2="55" stroke="#7170ff" stroke-width="0.5" stroke-opacity="0.08">
    <animate attributeName="stroke-opacity" values="0.05;0.15;0.05" dur="10s" repeatCount="indefinite"/>
  </line>
  <line x1="280" y1="55" x2="350" y2="90" stroke="#a78bfa" stroke-width="0.5" stroke-opacity="0.06">
    <animate attributeName="stroke-opacity" values="0.03;0.12;0.03" dur="7s" repeatCount="indefinite"/>
  </line>
  <line x1="100" y1="130" x2="180" y2="210" stroke="#5e6ad2" stroke-width="0.5" stroke-opacity="0.07">
    <animate attributeName="stroke-opacity" values="0.03;0.1;0.03" dur="11s" repeatCount="indefinite"/>
  </line>
  <line x1="180" y1="210" x2="260" y2="270" stroke="#7170ff" stroke-width="0.5" stroke-opacity="0.05">
    <animate attributeName="stroke-opacity" values="0.02;0.08;0.02" dur="9s" repeatCount="indefinite"/>
  </line>
  <line x1="300" y1="230" x2="370" y2="160" stroke="#a78bfa" stroke-width="0.5" stroke-opacity="0.06">
    <animate attributeName="stroke-opacity" values="0.02;0.1;0.02" dur="13s" repeatCount="indefinite"/>
  </line>
</svg>
