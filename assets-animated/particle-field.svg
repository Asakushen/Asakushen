<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" style="display:block;width:100%;height:auto;overflow:visible">
  <!-- Background glow blobs -->
  <circle cx="80" cy="80" r="60" fill="#5e6ad2" opacity="0.04">
    <animate attributeName="cx" values="80;120;55;80" dur="16s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="80;60;95;80" dur="19s" repeatCount="indefinite"/>
    <animate attributeName="r" values="60;80;50;60" dur="12s" repeatCount="indefinite"/>
  </circle>
  <circle cx="320" cy="200" r="50" fill="#a78bfa" opacity="0.03">
    <animate attributeName="cx" values="320;280;350;320" dur="22s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="200;175;215;200" dur="17s" repeatCount="indefinite"/>
  </circle>

  <!-- Particle 1 -->
  <g>
    <animateTransform attributeName="transform" type="translate" values="0,0;30,-20;-10,-35;-25,10;0,0" dur="18s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0.8;0.2;0.7;0.3" dur="18s" repeatCount="indefinite"/>
    <circle cx="50" cy="40" r="2.5" fill="#7170ff"/>
  </g>
  <!-- Particle 2 -->
  <g>
    <animateTransform attributeName="transform" type="translate" values="0,0;-20,-25;15,-10;0,0" dur="14s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0.9;0.3;0.5" dur="14s" repeatCount="indefinite"/>
    <circle cx="150" cy="20" r="1.8" fill="#a78bfa"/>
  </g>
  <!-- Particle 3 -->
  <g>
    <animateTransform attributeName="transform" type="translate" values="0,0;25,-15;0,0" dur="20s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;0.9;0.4" dur="20s" repeatCount="indefinite"/>
    <animate attributeName="r" values="3;4.5;3" dur="20s" repeatCount="indefinite"/>
    <circle cx="280" cy="45" r="3" fill="#5e6ad2"/>
  </g>
  <!-- Particle 4 -->
  <g>
    <animateTransform attributeName="transform" type="translate" values="0,0;-30,10;10,-20;0,0" dur="16s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;0.2;0.8;0.6" dur="16s" repeatCount="indefinite"/>
    <circle cx="350" cy="80" r="2" fill="#7170ff"/>
  </g>
  <!-- Particle 5 -->
  <g>
    <animateTransform attributeName="transform" type="translate" values="0,0;15,20;-20,-5;0,0" dur="22s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0.7;0.4;0.3" dur="22s" repeatCount="indefinite"/>
    <animate attributeName="r" values="2.8;3.8;2;2.8" dur="22s" repeatCount="indefinite"/>
    <circle cx="100" cy="120" r="2.8" fill="#a78bfa"/>
  </g>
  <!-- Particle 6 -->
  <g>
    <animateTransform attributeName="transform" type="translate" values="0,0;-15,-30;0,0" dur="12s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;0.3;0.7" dur="12s" repeatCount="indefinite"/>
    <circle cx="220" cy="100" r="1.5" fill="#10b981"/>
  </g>
  <!-- Particle 7 -->
  <g>
    <animateTransform attributeName="transform" type="translate" values="0,0;20,15;-25,-10;5,20;0,0" dur="19s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;0.8;0.2;0.6;0.4" dur="19s" repeatCount="indefinite"/>
    <circle cx="370" cy="150" r="2.2" fill="#7170ff"/>
  </g>
  <!-- Particle 8 -->
  <g>
    <animateTransform attributeName="transform" type="translate" values="0,0;-18,12;22,-18;0,0" dur="24s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0.9;0.3;0.5" dur="24s" repeatCount="indefinite"/>
    <animate attributeName="r" values="3.2;2;3.5;3.2" dur="24s" repeatCount="indefinite"/>
    <circle cx="60" cy="180" r="3.2" fill="#a78bfa"/>
  </g>
  <!-- Particle 9 -->
  <g>
    <animateTransform attributeName="transform" type="translate" values="0,0;-8,-17;12,7;0,0" dur="15s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.55;0.25;0.7;0.55" dur="15s" repeatCount="indefinite"/>
    <circle cx="180" cy="200" r="1.8" fill="#5e6ad2"/>
  </g>
  <!-- Particle 10 -->
  <g>
    <animateTransform attributeName="transform" type="translate" values="0,0;8,-18;-6,10;0,0" dur="21s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;0.8;0.25;0.4" dur="21s" repeatCount="indefinite"/>
    <animate attributeName="r" values="2.6;3.2;2;2.6" dur="21s" repeatCount="indefinite"/>
    <circle cx="300" cy="220" r="2.6" fill="#7170ff"/>
  </g>
  <!-- Particle 11 -->
  <g>
    <animateTransform attributeName="transform" type="translate" values="0,0;10,20;-5,-10;0,0" dur="26s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0.3;0.7;0.5" dur="26s" repeatCount="indefinite"/>
    <circle cx="120" cy="250" r="2" fill="#10b981"/>
  </g>
  <!-- Particle 12 -->
  <g>
    <animateTransform attributeName="transform" type="translate" values="0,0;-12,-18;8,14;0,0" dur="17s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0.6;0.2;0.3" dur="17s" repeatCount="indefinite"/>
    <animate attributeName="r" values="3.5;2.5;4;3.5" dur="17s" repeatCount="indefinite"/>
    <circle cx="260" cy="260" r="3.5" fill="#a78bfa"/>
  </g>
  <!-- Particle 13 -->
  <g>
    <animateTransform attributeName="transform" type="translate" values="0,0;15,-22;-10,12;0,0" dur="20s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.65;0.3;0.7;0.65" dur="20s" repeatCount="indefinite"/>
    <circle cx="380" cy="240" r="1.5" fill="#7170ff"/>
  </g>
  <!-- Particle 14 -->
  <g>
    <animateTransform attributeName="transform" type="translate" values="0,0;-18,8;12,-15;0,0" dur="23s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.45;0.2;0.6;0.45" dur="23s" repeatCount="indefinite"/>
    <circle cx="40" cy="270" r="2.3" fill="#5e6ad2"/>
  </g>
  <!-- Particle 15 -->
  <g>
    <animateTransform attributeName="transform" type="translate" values="0,0;6,-15;-4,8;0,0" dur="18s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0.25;0.6;0.5" dur="18s" repeatCount="indefinite"/>
    <circle cx="200" cy="280" r="1.9" fill="#a78bfa"/>
  </g>
  <!-- Particle 16 -->
  <g>
    <animateTransform attributeName="transform" type="translate" values="0,0;-10,15;6,-12;0,0" dur="22s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.35;0.15;0.5;0.35" dur="22s" repeatCount="indefinite"/>
    <animate attributeName="r" values="2.7;1.8;3.2;2.7" dur="22s" repeatCount="indefinite"/>
    <circle cx="340" cy="35" r="2.7" fill="#10b981"/>
  </g>

  <!-- Constellation lines -->
  <line x1="80" y1="60" x2="150" y2="30" stroke="#5e6ad2" stroke-width="0.5">
    <animate attributeName="stroke-opacity" values="0.04;0.18;0.04" dur="8s" repeatCount="indefinite"/>
  </line>
  <line x1="150" y1="30" x2="280" y2="55" stroke="#7170ff" stroke-width="0.5">
    <animate attributeName="stroke-opacity" values="0.04;0.14;0.04" dur="10s" repeatCount="indefinite"/>
  </line>
  <line x1="280" y1="55" x2="350" y2="90" stroke="#a78bfa" stroke-width="0.5">
    <animate attributeName="stroke-opacity" values="0.03;0.1;0.03" dur="7s" repeatCount="indefinite"/>
  </line>
  <line x1="100" y1="130" x2="180" y2="210" stroke="#5e6ad2" stroke-width="0.5">
    <animate attributeName="stroke-opacity" values="0.03;0.1;0.03" dur="11s" repeatCount="indefinite"/>
  </line>
  <line x1="180" y1="210" x2="260" y2="270" stroke="#7170ff" stroke-width="0.5">
    <animate attributeName="stroke-opacity" values="0.02;0.08;0.02" dur="9s" repeatCount="indefinite"/>
  </line>
  <line x1="300" y1="230" x2="370" y2="160" stroke="#a78bfa" stroke-width="0.5">
    <animate attributeName="stroke-opacity" values="0.02;0.1;0.02" dur="13s" repeatCount="indefinite"/>
  </line>
  <line x1="220" y1="100" x2="300" y2="220" stroke="#10b981" stroke-width="0.3">
    <animate attributeName="stroke-opacity" values="0.02;0.08;0.02" dur="15s" repeatCount="indefinite"/>
  </line>
</svg>
