<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 160" style="display:block;width:100%;height:auto;overflow:visible">
  <defs>
    <linearGradient id="sb" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5e6ad2"/>
      <stop offset="100%" stop-color="#7170ff"/>
      <animate attributeName="x1" values="0%;50%;0%" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="100%;50%;100%" dur="6s" repeatCount="indefinite"/>
    </linearGradient>
  </defs>
  <!-- Stats cards with spring entrance -->
  <!-- Card 1 -->
  <g>
    <rect x="10" y="10" width="130" height="55" rx="12" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.08)" stroke-width="0.8">
      <animate attributeName="opacity" values="0;1" dur="0.8s" begin="0.2s" fill="freeze" calcMode="spline" keySplines="0.34,1.56,0.64,1"/>
    </rect>
    <text x="75" y="32" text-anchor="middle" fill="#f7f8f8" font-size="22" font-family="system-ui, sans-serif" font-weight="500">
      Stars
      <animate attributeName="opacity" values="0;1" dur="0.5s" begin="0.4s" fill="freeze"/>
    </text>
    <text x="75" y="52" text-anchor="middle" fill="#7170ff" font-size="16" font-family="system-ui, sans-serif" font-weight="600">
      <tspan>⭐</tspan>
    </text>
  </g>
  <!-- Card 2 -->
  <g>
    <rect x="155" y="10" width="130" height="55" rx="12" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.08)" stroke-width="0.8">
      <animate attributeName="opacity" values="0;1" dur="0.8s" begin="0.45s" fill="freeze" calcMode="spline" keySplines="0.34,1.56,0.64,1"/>
    </rect>
    <text x="220" y="32" text-anchor="middle" fill="#f7f8f8" font-size="22" font-family="system-ui, sans-serif" font-weight="500">Repos</text>
    <text x="220" y="52" text-anchor="middle" fill="#a78bfa" font-size="16" font-family="system-ui, sans-serif">
      <animate attributeName="opacity" values="0;1" dur="0.5s" begin="0.65s" fill="freeze"/>
    </text>
  </g>
  <!-- Card 3 -->
  <g>
    <rect x="300" y="10" width="130" height="55" rx="12" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.08)" stroke-width="0.8">
      <animate attributeName="opacity" values="0;1" dur="0.8s" begin="0.7s" fill="freeze" calcMode="spline" keySplines="0.34,1.56,0.64,1"/>
    </rect>
    <text x="365" y="32" text-anchor="middle" fill="#f7f8f8" font-size="22" font-family="system-ui, sans-serif" font-weight="500">Followers</text>
    <text x="365" y="52" text-anchor="middle" fill="#10b981" font-size="16" font-family="system-ui, sans-serif">
      <animate attributeName="opacity" values="0;1" dur="0.5s" begin="0.9s" fill="freeze"/>
    </text>
  </g>
  <!-- Card 4 -->
  <g>
    <rect x="445" y="10" width="145" height="55" rx="12" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.08)" stroke-width="0.8">
      <animate attributeName="opacity" values="0;1" dur="0.8s" begin="0.95s" fill="freeze" calcMode="spline" keySplines="0.34,1.56,0.64,1"/>
    </rect>
    <text x="517" y="32" text-anchor="middle" fill="#f7f8f8" font-size="22" font-family="system-ui, sans-serif" font-weight="500">Contributions</text>
    <text x="517" y="52" text-anchor="middle" fill="#f59e0b" font-size="16" font-family="system-ui, sans-serif">
      <animate attributeName="opacity" values="0;1" dur="0.5s" begin="1.15s" fill="freeze"/>
    </text>
  </g>

  <!-- Bottom shimmer line -->
  <rect x="0" y="90" width="600" height="1" rx="0.5" fill="url(#sb)" opacity="0.4">
    <animate attributeName="opacity" values="0.2;0.6;0.2" dur="4s" repeatCount="indefinite"/>
  </rect>

  <!-- Animated dots -->
  <circle cx="50" cy="120" r="2" fill="#7170ff">
    <animate attributeName="cy" values="120;105;120" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0.8;0.3" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="200" cy="130" r="1.5" fill="#a78bfa">
    <animate attributeName="cy" values="130;115;130" dur="4s" repeatCount="indefinite" begin="0.5s"/>
    <animate attributeName="opacity" values="0.2;0.7;0.2" dur="4s" repeatCount="indefinite" begin="0.5s"/>
  </circle>
  <circle cx="400" cy="125" r="2.5" fill="#10b981">
    <animate attributeName="cy" values="125;110;125" dur="3.5s" repeatCount="indefinite" begin="1s"/>
    <animate attributeName="opacity" values="0.3;0.75;0.3" dur="3.5s" repeatCount="indefinite" begin="1s"/>
  </circle>
  <circle cx="550" cy="120" r="1.8" fill="#5e6ad2">
    <animate attributeName="cy" values="120;108;120" dur="5s" repeatCount="indefinite" begin="1.5s"/>
    <animate attributeName="opacity" values="0.2;0.6;0.2" dur="5s" repeatCount="indefinite" begin="1.5s"/>
  </circle>
</svg>
