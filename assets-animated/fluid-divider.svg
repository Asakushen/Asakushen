<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 80" style="display:block;width:100%;height:80px">
  <defs>
    <linearGradient id="d1g" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#5e6ad2">
        <animate attributeName="stop-color" values="#5e6ad2;#10b981;#a78bfa;#5e6ad2" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="35%" stop-color="#7170ff">
        <animate attributeName="stop-color" values="#7170ff;#a78bfa;#5e6ad2;#7170ff" dur="5s" repeatCount="indefinite"/>
      </stop>
      <stop offset="65%" stop-color="#a78bfa">
        <animate attributeName="stop-color" values="#a78bfa;#7170ff;#10b981;#a78bfa" dur="7s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#10b981">
        <animate attributeName="stop-color" values="#10b981;#5e6ad2;#a78bfa;#10b981" dur="6s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <filter id="d1b"><feGaussianBlur stdDeviation="6">
      <animate attributeName="stdDeviation" values="5;10;6;8;5" dur="4s" repeatCount="indefinite"/>
    </feGaussianBlur></filter>
  </defs>
  <rect x="0" y="34" width="800" height="6" rx="3" filter="url(#d1b)" opacity="0.35">
    <animate attributeName="opacity" values="0.2;0.6;0.2" dur="3.5s" repeatCount="indefinite"/>
  </rect>
  <rect x="0" y="39" width="800" height="2" rx="1" fill="url(#d1g)" opacity="0.8">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="2.5s" repeatCount="indefinite"/>
  </rect>
  <circle cx="120" cy="41" r="3">
    <animate attributeName="cx" values="120;300;500;650;120" dur="14s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.7;0.5;0.7;0" dur="14s" repeatCount="indefinite"/>
    <animate attributeName="r" values="2;4;2;5;2" dur="14s" repeatCount="indefinite"/>
  </circle>
  <circle cx="450" cy="38" r="2.5">
