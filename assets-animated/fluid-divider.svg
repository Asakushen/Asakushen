<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 80" style="display:block;width:100%;height:80px;overflow:visible">
  <defs>
    <linearGradient id="gd" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#5e6ad2"/>
      <stop offset="25%" stop-color="#7170ff">
        <animate attributeName="stop-color" values="#7170ff;#a78bfa;#7185ff;#7170ff" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" stop-color="#a78bfa">
        <animate attributeName="stop-color" values="#a78bfa;#5e6ad2;#a78bfa;#c4b5fd;#a78bfa" dur="8s" repeatCount="indefinite"/>
      </stop>
      <stop offset="75%" stop-color="#10b981">
        <animate attributeName="stop-color" values="#10b981;#7170ff;#10b981;#34d399;#10b981" dur="7s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#5e6ad2">
        <animate attributeName="stop-color" values="#5e6ad2;#a78bfa;#5e6ad2" dur="10s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <filter id="gb">
      <feGaussianBlur stdDeviation="8">
        <animate attributeName="stdDeviation" values="6;12;6" dur="5s" repeatCount="indefinite"/>
      </feGaussianBlur>
    </filter>
  </defs>
  <!-- Background glow -->
  <rect x="0" y="20" width="800" height="4" rx="2" filter="url(#gb)" opacity="0.5">
    <animate attributeName="opacity" values="0.3;0.7;0.3" dur="4s" repeatCount="indefinite"/>
  </rect>
  <!-- Main gradient line -->
  <rect x="0" y="32" width="800" height="2" rx="1" fill="url(#gd)">
    <animate attributeName="opacity" values="0.7;1;0.7" dur="3s" repeatCount="indefinite"/>
  </rect>
  <!-- Floating particles -->
  <circle cx="100" cy="34" r="3" fill="#7170ff" opacity="0.6">
    <animate attributeName="cx" values="100;250;400;550;700;100" dur="15s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.8;0.6;0.8;0;0.8;0" dur="15s" repeatCount="indefinite"/>
    <animate attributeName="r" values="2;4;2;5;3;2" dur="15s" repeatCount="indefinite"/>
  </circle>
  <circle cx="500" cy="30" r="2" fill="#a78bfa" opacity="0.5">
    <animate attributeName="cx" values="500;350;200;100;500" dur="12s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0;0.7;0.3;0.5" dur="12s" repeatCount="indefinite"/>
  </circle>
  <circle cx="700" cy="36" r="4" fill="#10b981" opacity="0.4">
    <animate attributeName="cx" values="700;550;300;100;700" dur="18s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.5;0.3;0.6;0;0.5;0.4" dur="18s" repeatCount="indefinite"/>
    <animate attributeName="r" values="1;3;1;4;2;3" dur="18s" repeatCount="indefinite"/>
  </circle>
</svg>
