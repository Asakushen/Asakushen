<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 70" style="display:block;width:100%;height:auto">
  <defs>
    <linearGradient id="fdg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#6366f1"><animate attributeName="stop-color" values="#6366f1;#a78bfa;#10b981;#6366f1" dur="6s" repeatCount="indefinite"/></stop>
      <stop offset="35%"  stop-color="#818cf8"><animate attributeName="stop-color" values="#818cf8;#6366f1;#a78bfa;#818cf8" dur="5s" repeatCount="indefinite"/></stop>
      <stop offset="70%"  stop-color="#a78bfa"><animate attributeName="stop-color" values="#a78bfa;#10b981;#818cf8;#a78bfa" dur="7s" repeatCount="indefinite"/></stop>
      <stop offset="100%" stop-color="#10b981"><animate attributeName="stop-color" values="#10b981;#818cf8;#6366f1;#10b981" dur="6s" repeatCount="indefinite"/></stop>
    </linearGradient>
    <filter id="fdb"><feGaussianBlur stdDeviation="6">
      <animate attributeName="stdDeviation" values="5;9;6;7;5" dur="4s" repeatCount="indefinite"/>
    </feGaussianBlur></filter>
  </defs>
  <!-- glow line -->
  <rect x="0" y="31" width="800" height="5" rx="2.5" filter="url(#fdb)" opacity="0.3">
    <animate attributeName="opacity" values="0.15;0.5;0.15" dur="3.5s" repeatCount="indefinite"/>
  </rect>
  <!-- core line -->
  <rect x="0" y="34" width="800" height="1.5" rx="0.75" fill="url(#fdg)">
    <animate attributeName="opacity" values="0.5;0.9;0.5" dur="2.8s" repeatCount="indefinite"/>
  </rect>
  <!-- drifting particles -->
  <circle cx="80"  cy="33" r="2.5">
    <animate attributeName="cx" values="80;220;420;620;80" dur="16s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.65;0.4;0.6;0" dur="16s" repeatCount="indefinite"/>
    <animate attributeName="r"    values="1.5;3;2;3.5;1.5" dur="16s" repeatCount="indefinite"/>
  </circle>
  <circle cx="300" cy="37" r="2">
    <animate attributeName="cx" values="300;180;60;160;300" dur="13s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0.05;0.5;0.2;0.3" dur="13s" repeatCount="indefinite"/>
  </circle>
  <circle cx="540" cy="32" r="3">
    <animate attributeName="cx" values="540;420;260;120;540" dur="18s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.35;0.2;0.45;0" dur="18s" repeatCount="indefinite"/>
    <animate attributeName="r"    values="2;3.5;2;4;2" dur="18s" repeatCount="indefinite"/>
  </circle>
  <circle cx="680" cy="36" r="1.8">
    <animate attributeName="cx" values="680;550;380;200;680" dur="11s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;0.15;0.55;0.25;0.4" dur="11s" repeatCount="indefinite"/>
  </circle>
</svg>
