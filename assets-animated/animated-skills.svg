<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 120" style="display:block;width:100%;height:auto;overflow:visible">
  <defs>
    <linearGradient id="mg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#5e6ad2">
        <animate attributeName="stop-color" values="#5e6ad2;#10b981;#5e6ad2" dur="5s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#10b981">
        <animate attributeName="stop-color" values="#10b981;#5e6ad2;#10b981" dur="5s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <linearGradient id="tg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f7f8f8"/>
      <stop offset="50%" stop-color="#7170ff">
        <animate attributeName="stop-color" values="#7170ff;#a78bfa;#7170ff" dur="4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#f7f8f8"/>
    </linearGradient>
  </defs>
  <!-- Metric bars -->
  <g transform="translate(0,10)">
    <!-- Python -->
    <rect x="0" y="0" width="0" height="8" rx="4" fill="url(#mg)" opacity="0.8">
      <animate attributeName="width" values="0;320;320" dur="1.5s" begin="0.2s" fill="freeze" calcMode="spline" keyTimes="0;0.6;1" keySplines="0.34,1.56,0.64,1;0.4,0,0.6,1"/>
    </rect>
    <text x="6" y="16" fill="#8a8f98" font-size="11" font-family="system-ui, sans-serif" font-weight="500">Python</text>
    <!-- JS -->
    <rect x="0" y="32" width="0" height="8" rx="4" fill="url(#mg)" opacity="0.8">
      <animate attributeName="width" values="0;260;260" dur="1.5s" begin="0.5s" fill="freeze" calcMode="spline" keyTimes="0;0.6;1" keySplines="0.34,1.56,0.64,1;0.4,0,0.6,1"/>
    </rect>
    <text x="6" y="48" fill="#8a8f98" font-size="11" font-family="system-ui, sans-serif" font-weight="500">JavaScript</text>
    <!-- C++ -->
    <rect x="0" y="64" width="0" height="8" rx="4" fill="url(#mg)" opacity="0.8">
      <animate attributeName="width" values="0;200;200" dur="1.5s" begin="0.8s" fill="freeze" calcMode="spline" keyTimes="0;0.6;1" keySplines="0.34,1.56,0.64,1;0.4,0,0.6,1"/>
    </rect>
    <text x="6" y="80" fill="#8a8f98" font-size="11" font-family="system-ui, sans-serif" font-weight="500">C/C++</text>
    <!-- Django -->
    <rect x="0" y="96" width="0" height="8" rx="4" fill="url(#mg)" opacity="0.7">
      <animate attributeName="width" values="0;170;170" dur="1.5s" begin="1.1s" fill="freeze" calcMode="spline" keyTimes="0;0.6;1" keySplines="0.34,1.56,0.64,1;0.4,0,0.6,1"/>
    </rect>
    <text x="6" y="112" fill="#8a8f98" font-size="11" font-family="system-ui, sans-serif" font-weight="500">Django</text>
  </g>
</svg>
